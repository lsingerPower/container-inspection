<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>GoGreen Inspection</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#fff;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.header h1{font-size:20px;font-weight:700;letter-spacing:0.5px}
.header .subtitle{font-size:12px;opacity:0.7;margin-top:2px}
.container{max-width:600px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card h2{font-size:18px;margin-bottom:16px;color:#1a1a2e;border-bottom:2px solid #4ecca3;padding-bottom:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:14px;color:#555}
.form-group input,.form-group select{width:100%;padding:14px 16px;border:2px solid #ddd;border-radius:8px;font-size:16px;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus{border-color:#4ecca3;outline:none}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;margin-bottom:10px}
.btn-primary{background:#4ecca3;color:#fff}
.btn-primary:hover{background:#3db892}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-secondary{background:#e0e0e0;color:#333}
.btn-secondary:hover{background:#d0d0d0}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-small{display:inline-block;width:auto;padding:10px 20px;font-size:14px}
.po-list{list-style:none;margin:10px 0}
.po-list li{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8f9fa;border-radius:6px;margin-bottom:6px;font-size:15px}
.po-list li .remove{color:#e74c3c;cursor:pointer;font-weight:700;font-size:18px;padding:0 8px}
.step-indicator{display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:13px;color:#888}
.step-indicator .current{color:#4ecca3;font-weight:700}
.photo-input{position:relative}
.photo-input input[type=file]{display:none}
.photo-input .photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:2px dashed #ccc;border-radius:8px;cursor:pointer;font-size:15px;color:#666;transition:all 0.2s;min-height:60px}
.photo-input .photo-btn.has-photo{border-color:#4ecca3;background:#f0faf6;color:#333}
.photo-input .photo-btn:active{background:#f0f0f0}
.photo-preview{width:60px;height:60px;object-fit:cover;border-radius:6px}
.result-pass{background:#d4edda;border:2px solid #28a745;border-radius:8px;padding:16px;text-align:center;margin:10px 0}
.result-fail{background:#f8d7da;border:2px solid #dc3545;border-radius:8px;padding:16px;text-align:center;margin:10px 0}
.result-icon{font-size:48px;margin-bottom:8px}
.match-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:14px}
.match-row:last-child{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700}
.badge-pass{background:#d4edda;color:#155724}
.badge-fail{background:#f8d7da;color:#721c24}
.badge-na{background:#e2e3e5;color:#383d41}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200}
.loading-box{background:#fff;border-radius:12px;padding:30px;text-align:center}
.spinner{width:40px;height:40px;border:4px solid #ddd;border-top-color:#4ecca3;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.item-count{background:#4ecca3;color:#fff;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700}
.skip-note{font-size:12px;color:#888;font-style:italic;margin-top:4px}
.barcode-status{margin-top:6px;font-size:13px;padding:6px 10px;border-radius:6px}
.barcode-found{background:#d4edda;color:#155724}
.barcode-notfound{background:#f8d7da;color:#721c24}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:300;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.camera-scanner-wrap{margin-bottom:12px}
.btn-scan-camera{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:2px solid #4ecca3;border-radius:8px;background:#f0faf6;color:#1a1a2e;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-scan-camera:active{background:#d0f0e4}
.camera-viewfinder{position:relative;width:100%;height:300px;border-radius:8px;overflow:hidden;background:#000;margin-top:10px}
.btn-cancel-scan{display:block;width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#e74c3c;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-cancel-scan:active{background:#c0392b}
</style>
</head>
<body>
<div class="header">
<h1>GoGreen Inspection</h1>
<div class="subtitle">Container Inspection System</div>
</div>
<div id="app"></div>
<div id="loading" class="loading-overlay hidden">
<div class="loading-box">
<div class="spinner"></div>
<div id="loading-text">Saving inspection...</div>
</div>
</div>
<div id="toast" class="toast"></div>
<script>// GoGreen Container Inspection PWA - JavaScript
var API_URL = 'https://script.google.com/macros/s/AKfycbxBvL9LPGGmSWH7HlWCBqERg6Of41zHSbPTmTHTyQDHgK0GSF86-EduLiCIpCumzKp0Nw/exec';
(function(){
'use strict';

let state = {
  screen: 'start',
  inspector: '',
  container: '',
  poNumbers: [],
  poInput: '',
  lookupData: [],
  lookupLoaded: false,
  // Item inspection
  currentItem: 0,
  selectedPO: '',
  masterBarcode: '',
  innerBarcode: '',
  itemBarcode: '',
  photos: {},
  identifiedItem: null,
  hasInner: true,
  // Wizard step within item inspection
  step: 0,
  // Results
  results: [],
  lastResult: null
};

const PHOTO_STEPS = [
  {key: 0, label: 'ITF Label', icon: '🏷️'},
  {key: 1, label: 'Master Case - Outside', icon: '📦'},
  {key: 2, label: 'Master Case - Inside', icon: '📦'},
  {key: 3, label: 'Inner Case - Outside', icon: '📋', innerOnly: true},
  {key: 4, label: 'Inner Case - Inside', icon: '📋', innerOnly: true},
  {key: 5, label: 'Retail Item - Front', icon: '🏪'},
  {key: 6, label: 'Retail Item - Side 1', icon: '🏪'},
  {key: 7, label: 'Retail Item - Side 2', icon: '🏪'},
  {key: 8, label: 'Retail Item - Back', icon: '🏪'}
];

// Wizard steps for item inspection
const WIZARD_STEPS = [
  'select-po',
  'scan-master',
  'photo-0', 'photo-1', 'photo-2',
  'scan-inner',
  'photo-3', 'photo-4',
  'scan-item',
  'photo-5', 'photo-6', 'photo-7', 'photo-8',
  'review'
];

function getVisibleSteps() {
  if (state.hasInner) return WIZARD_STEPS;
  return WIZARD_STEPS.filter(s => s !== 'scan-inner' && s !== 'photo-3' && s !== 'photo-4');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || 'Saving...';
  document.getElementById('loading').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}

function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'start': app.innerHTML = renderStart(); break;
    case 'inspect': app.innerHTML = renderInspect(); break;
    case 'result': app.innerHTML = renderResult(); break;
    case 'summary': app.innerHTML = renderSummary(); break;
  }
  bindEvents();
}

// ===== START SCREEN =====
function renderStart() {
  const poItems = state.poNumbers.map((po, i) =>
    '<li>' + po + '<span class="remove" data-po-idx="' + i + '">✕</span></li>'
  ).join('');
  
  const canStart = state.inspector.trim() && state.container.trim() && state.poNumbers.length > 0;
  
  return '<div class="container">' +
    '<div class="card">' +
    '<h2>📋 New Inspection</h2>' +
    '<div class="form-group">' +
    '<label>Inspector Name</label>' +
    '<input type="text" id="inspector" placeholder="Enter your name" value="' + escHtml(state.inspector) + '">' +
    '</div>' +
    '<div class="form-group">' +
    '<label>Container Number</label>' +
    '<input type="text" id="container" placeholder="e.g. 12345" value="' + escHtml(state.container) + '">' +
    '</div>' +
    '<div class="form-group">' +
    '<label>PO Numbers</label>' +
    '<div style="display:flex;gap:8px">' +
    '<input type="text" id="po-input" placeholder="Enter PO #" value="' + escHtml(state.poInput) + '" style="flex:1">' +
    '<button class="btn btn-secondary btn-small" id="add-po">Add PO</button>' +
    '</div>' +
    (state.poNumbers.length > 0 ? '<ul class="po-list">' + poItems + '</ul>' : '<div class="skip-note">Add at least 1 PO number</div>') +
    '</div>' +
    '<button class="btn btn-primary" id="start-btn"' + (canStart ? '' : ' disabled') + '>Start Inspection</button>' +
    '</div>' +
    (state.lookupLoaded ? '<div style="text-align:center;font-size:12px;color:#888">✅ ' + state.lookupData.length + ' products loaded</div>' : '<div style="text-align:center;font-size:12px;color:#888">Loading product data...</div>') +
    '</div>';
}
// ===== INSPECT SCREEN =====
function renderInspect() {
  const steps = getVisibleSteps();
  const stepName = steps[state.step];
  const totalSteps = steps.length;
  const stepNum = state.step + 1;
  
  let content = '';
  
  if (stepName === 'select-po') {
    const opts = state.poNumbers.map(po => '<option value="' + escHtml(po) + '"' + (state.selectedPO === po ? ' selected' : '') + '>' + escHtml(po) + '</option>').join('');
    content = '<div class="form-group"><label>Select PO Number</label>' +
      '<select id="sel-po"><option value="">-- Select PO --</option>' + opts + '</select></div>';
  } else if (stepName === 'scan-master') {
    content = '<div class="form-group"><label>Scan Master Case Barcode</label>' +
      '<div class="camera-scanner-wrap"><button class="btn-scan-camera" data-scan-target="master">📷 Scan Barcode with Camera</button></div>' +
      '<div id="camera-reader-master" class="hidden"></div>' +
      '<input type="text" id="master-bc" placeholder="Or type barcode manually" value="' + escHtml(state.masterBarcode) + '" autofocus>' +
      (state.identifiedItem ? '<div class="barcode-status barcode-found">✅ Identified: ' + escHtml(state.identifiedItem.item) + '</div>' : 
       (state.masterBarcode.length > 5 ? '<div class="barcode-status barcode-notfound">⚠️ Item not found in lookup table</div>' : '')) +
      '</div>';
  } else if (stepName === 'scan-inner') {
    content = '<div class="form-group"><label>Scan Inner Case Barcode</label>' +
      '<div class="camera-scanner-wrap"><button class="btn-scan-camera" data-scan-target="inner">📷 Scan Barcode with Camera</button></div>' +
      '<div id="camera-reader-inner" class="hidden"></div>' +
      '<input type="text" id="inner-bc" placeholder="Or type barcode manually" value="' + escHtml(state.innerBarcode) + '" autofocus></div>';
  } else if (stepName === 'scan-item') {
    content = '<div class="form-group"><label>Scan Item Barcode (UPC)</label>' +
      '<div class="camera-scanner-wrap"><button class="btn-scan-camera" data-scan-target="item">📷 Scan Barcode with Camera</button></div>' +
      '<div id="camera-reader-item" class="hidden"></div>' +
      '<input type="text" id="item-bc" placeholder="Or type barcode manually" value="' + escHtml(state.itemBarcode) + '" autofocus></div>';
  } else if (stepName === 'review') {
    content = renderReviewStep();
  } else if (stepName.startsWith('photo-')) {
    const photoIdx = parseInt(stepName.split('-')[1]);
    const photoInfo = PHOTO_STEPS[photoIdx];
    const hasPhoto = !!state.photos[photoIdx];
    content = '<div class="form-group"><label>' + photoInfo.icon + ' ' + photoInfo.label + '</label>' +
      '<div class="photo-input">' +
      '<label for="photo-' + photoIdx + '" class="photo-btn' + (hasPhoto ? ' has-photo' : '') + '">' +
      (hasPhoto ? '<img class="photo-preview" src="' + state.photos[photoIdx].preview + '"> Photo captured ✓' : '📸 Tap to take photo') +
      '</label>' +
      '<input type="file" id="photo-' + photoIdx + '" accept="image/*" capture="environment" data-photo-idx="' + photoIdx + '">' +
      '</div></div>';
  }

  const canNext = canAdvanceStep(stepName);
  const isLast = stepName === 'review';
  
  return '<div class="container">' +
    '<div class="card">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
    '<h2 style="border:none;padding:0;margin:0">Item #' + (state.currentItem + 1) + '</h2>' +
    '<span class="item-count">Step ' + stepNum + '/' + totalSteps + '</span></div>' +
    '<div class="step-indicator"><span class="current">' + getStepLabel(stepName) + '</span></div>' +
    content +
    '<div style="display:flex;gap:10px;margin-top:16px">' +
    (state.step > 0 ? '<button class="btn btn-secondary" id="prev-step" style="flex:1">← Back</button>' : '') +
    (isLast ? 
      '<button class="btn btn-primary" id="save-item" style="flex:1"' + (canNext ? '' : ' disabled') + '>💾 Save Item</button>' :
      '<button class="btn btn-primary" id="next-step" style="flex:1"' + (canNext ? '' : ' disabled') + '>Next →</button>') +
    '</div>' +
    '</div>' +
    '<button class="btn btn-danger" id="finish-early" style="margin:0 16px;width:calc(100% - 32px)">Finish Inspection</button>' +
    '</div>';
}

function renderReviewStep() {
  const item = state.identifiedItem ? state.identifiedItem.item : 'Unknown';
  const photoCount = Object.keys(state.photos).length;
  const expectedPhotos = state.hasInner ? 9 : 7;
  return '<div style="font-size:14px">' +
    '<div class="match-row"><span>PO:</span><span>' + escHtml(state.selectedPO) + '</span></div>' +
    '<div class="match-row"><span>Item:</span><span>' + escHtml(item) + '</span></div>' +
    '<div class="match-row"><span>Master BC:</span><span>' + escHtml(state.masterBarcode) + '</span></div>' +
    (state.hasInner ? '<div class="match-row"><span>Inner BC:</span><span>' + escHtml(state.innerBarcode) + '</span></div>' : '') +
    '<div class="match-row"><span>Item BC:</span><span>' + escHtml(state.itemBarcode) + '</span></div>' +
    '<div class="match-row"><span>Photos:</span><span>' + photoCount + '/' + expectedPhotos + '</span></div>' +
    '</div>';
}

function getStepLabel(step) {
  if (step === 'select-po') return 'Select PO';
  if (step === 'scan-master') return 'Master Case Barcode';
  if (step === 'scan-inner') return 'Inner Case Barcode';
  if (step === 'scan-item') return 'Item Barcode';
  if (step === 'review') return 'Review & Save';
  if (step.startsWith('photo-')) {
    const idx = parseInt(step.split('-')[1]);
    return PHOTO_STEPS[idx].label;
  }
  return step;
}

function canAdvanceStep(step) {
  if (step === 'select-po') return !!state.selectedPO;
  if (step === 'scan-master') return state.masterBarcode.trim().length > 0;
  if (step === 'scan-inner') return state.innerBarcode.trim().length > 0;
  if (step === 'scan-item') return state.itemBarcode.trim().length > 0;
  if (step === 'review') return true;
  if (step.startsWith('photo-')) return true; // Photos optional to proceed
  return true;
}
// ===== RESULT SCREEN =====
function renderResult() {
  const r = state.lastResult;
  if (!r) return '<div class="container"><div class="card">No result</div></div>';
  
  const isPass = r.overallPass;
  return '<div class="container">' +
    '<div class="' + (isPass ? 'result-pass' : 'result-fail') + '">' +
    '<div class="result-icon">' + (isPass ? '✅' : '❌') + '</div>' +
    '<div style="font-size:20px;font-weight:700">' + (isPass ? 'PASS' : 'FAIL') + '</div>' +
    '<div style="font-size:14px;margin-top:4px">' + escHtml(r.itemModel) + '</div>' +
    '</div>' +
    '<div class="card">' +
    '<h2>Barcode Results</h2>' +
    '<div class="match-row"><span>Master Case</span><span class="badge ' + (r.masterMatch ? 'badge-pass' : 'badge-fail') + '">' + (r.masterMatch ? '✅ Match' : '❌ Mismatch') + '</span></div>' +
    '<div class="match-row"><span>Inner Case</span><span class="badge ' + (r.innerMatch === 'N/A' ? 'badge-na' : (r.innerMatch ? 'badge-pass' : 'badge-fail')) + '">' + (r.innerMatch === 'N/A' ? 'N/A' : (r.innerMatch ? '✅ Match' : '❌ Mismatch')) + '</span></div>' +
    '<div class="match-row"><span>Item UPC</span><span class="badge ' + (r.itemMatch ? 'badge-pass' : 'badge-fail') + '">' + (r.itemMatch ? '✅ Match' : '❌ Mismatch') + '</span></div>' +
    '</div>' +
    '<button class="btn btn-primary" id="next-item">Inspect Next Item</button>' +
    '<button class="btn btn-secondary" id="finish-all">Finish Inspection</button>' +
    '</div>';
}

// ===== SUMMARY SCREEN =====
function renderSummary() {
  const total = state.results.length;
  const passed = state.results.filter(r => r.overallPass).length;
  const failed = total - passed;
  const allClear = failed === 0;
  
  const rows = state.results.map((r, i) =>
    '<div class="match-row">' +
    '<span>#' + (i+1) + ' ' + escHtml(r.itemModel) + '</span>' +
    '<span class="badge ' + (r.overallPass ? 'badge-pass' : 'badge-fail') + '">' + (r.overallPass ? 'PASS' : 'FAIL') + '</span>' +
    '</div>'
  ).join('');
  
  return '<div class="container">' +
    '<div class="' + (allClear ? 'result-pass' : 'result-fail') + '">' +
    '<div class="result-icon">' + (allClear ? '🎉' : '⚠️') + '</div>' +
    '<div style="font-size:20px;font-weight:700">' + (allClear ? 'All Clear!' : 'Issues Found') + '</div>' +
    '<div style="font-size:14px;margin-top:4px">Container ' + escHtml(state.container) + '</div>' +
    '</div>' +
    '<div class="card">' +
    '<h2>Summary</h2>' +
    '<div class="match-row"><span>Total Items</span><span>' + total + '</span></div>' +
    '<div class="match-row"><span>Passed</span><span style="color:#28a745;font-weight:700">' + passed + '</span></div>' +
    '<div class="match-row"><span>Failed</span><span style="color:#dc3545;font-weight:700">' + failed + '</span></div>' +
    '</div>' +
    '<div class="card">' +
    '<h2>Items</h2>' + rows +
    '</div>' +
    '<button class="btn btn-primary" id="new-inspection">New Inspection</button>' +
    '</div>';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// ===== EVENT BINDING =====
function bindEvents() {
  // Start screen
  const inspectorEl = document.getElementById('inspector');
  if (inspectorEl) inspectorEl.addEventListener('input', function(e) { state.inspector = e.target.value; });
  
  const containerEl = document.getElementById('container');
  if (containerEl) containerEl.addEventListener('input', function(e) { state.container = e.target.value; });
  
  const poInputEl = document.getElementById('po-input');
  if (poInputEl) {
    poInputEl.addEventListener('input', function(e) { state.poInput = e.target.value; });
    poInputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') addPO(); });
  }
  
  const addPoBtn = document.getElementById('add-po');
  if (addPoBtn) addPoBtn.addEventListener('click', addPO);
  
  // Remove PO buttons
  document.querySelectorAll('.remove[data-po-idx]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.poNumbers.splice(parseInt(this.dataset.poIdx), 1);
      render();
    });
  });
  
  const startBtn = document.getElementById('start-btn');
  if (startBtn) startBtn.addEventListener('click', startInspection);
  
  // Inspect screen
  const selPo = document.getElementById('sel-po');
  if (selPo) selPo.addEventListener('change', function(e) { state.selectedPO = e.target.value; render(); });

  // Camera scan buttons
  document.querySelectorAll('.btn-scan-camera').forEach(function(el) {
    el.addEventListener('click', function() {
      var target = this.dataset.scanTarget;
      startCameraScan(target);
    });
  });

  const masterBc = document.getElementById('master-bc');
  if (masterBc) {
    masterBc.addEventListener('input', function(e) {
      state.masterBarcode = e.target.value;
      identifyItem(e.target.value);
      // Update status without full re-render to keep focus
      var statusEl = document.querySelector('.barcode-status');
      if (state.identifiedItem && statusEl) {
        statusEl.className = 'barcode-status barcode-found';
        statusEl.textContent = '\u2705 Identified: ' + state.identifiedItem.item;
      } else if (e.target.value.length > 5 && statusEl) {
        statusEl.className = 'barcode-status barcode-notfound';
        statusEl.textContent = '\u26A0\uFE0F Item not found in lookup table';
      }
    });
    masterBc.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); state.masterBarcode = this.value; identifyItem(this.value); var btn = document.getElementById('next-step'); if (btn && !btn.disabled) btn.click(); }
    });
  }
  
  const innerBc = document.getElementById('inner-bc');
  if (innerBc) {
    innerBc.addEventListener('input', function(e) { state.innerBarcode = e.target.value; });
    innerBc.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); state.innerBarcode = this.value; var btn = document.getElementById('next-step'); if (btn && !btn.disabled) btn.click(); }
    });
  }
  
  const itemBc = document.getElementById('item-bc');
  if (itemBc) {
    itemBc.addEventListener('input', function(e) { state.itemBarcode = e.target.value; });
    itemBc.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); state.itemBarcode = this.value; var btn = document.getElementById('next-step'); if (btn && !btn.disabled) btn.click(); }
    });
  }
  
  // Photo inputs
  document.querySelectorAll('input[type=file][data-photo-idx]').forEach(function(el) {
    el.addEventListener('change', function(e) {
      const idx = parseInt(this.dataset.photoIdx);
      const file = e.target.files[0];
      if (!file) return;
      compressAndStore(file, idx);
    });
  });
  
  // Navigation
  const nextStep = document.getElementById('next-step');
  if (nextStep) nextStep.addEventListener('click', goNextStep);
  
  const prevStep = document.getElementById('prev-step');
  if (prevStep) prevStep.addEventListener('click', goPrevStep);
  
  const saveItem = document.getElementById('save-item');
  if (saveItem) saveItem.addEventListener('click', saveCurrentItem);
  
  const finishEarly = document.getElementById('finish-early');
  if (finishEarly) finishEarly.addEventListener('click', function() {
    if (state.results.length === 0) {
      if (confirm('No items saved yet. Are you sure you want to finish?')) {
        state.screen = 'summary';
        render();
      }
    } else {
      state.screen = 'summary';
      render();
    }
  });
  
  // Result screen
  const nextItem = document.getElementById('next-item');
  if (nextItem) nextItem.addEventListener('click', function() {
    resetItemState();
    state.screen = 'inspect';
    render();
  });
  
  const finishAll = document.getElementById('finish-all');
  if (finishAll) finishAll.addEventListener('click', function() {
    state.screen = 'summary';
    render();
  });
  
  const newInsp = document.getElementById('new-inspection');
  if (newInsp) newInsp.addEventListener('click', function() {
    state = {
      screen: 'start', inspector: state.inspector, container: '', poNumbers: [], poInput: '',
      lookupData: state.lookupData, lookupLoaded: state.lookupLoaded,
      currentItem: 0, selectedPO: '', masterBarcode: '', innerBarcode: '', itemBarcode: '',
      photos: {}, identifiedItem: null, hasInner: true, step: 0, results: [], lastResult: null
    };
    render();
  });
}

function addPO() {
  const val = state.poInput.trim();
  if (val && !state.poNumbers.includes(val)) {
    state.poNumbers.push(val);
    state.poInput = '';
  }
  render();
  var el = document.getElementById('po-input');
  if (el) el.focus();
}

function startInspection() {
  state.currentItem = 0;
  state.results = [];
  resetItemState();
  state.screen = 'inspect';
  render();
}

function resetItemState() {
  state.selectedPO = state.poNumbers.length === 1 ? state.poNumbers[0] : '';
  state.masterBarcode = '';
  state.innerBarcode = '';
  state.itemBarcode = '';
  state.photos = {};
  state.identifiedItem = null;
  state.hasInner = true;
  state.step = 0;
}

// Fuzzy barcode matching — handles check digit differences
// Compares with and without last digit, and zero-padded variants
function fuzzyBarcodeMatch(scanned, expectedArray) {
  if (!expectedArray || expectedArray.length === 0) return false;
  var s = scanned.trim();
  if (!s) return false;
  for (var i = 0; i < expectedArray.length; i++) {
    var e = expectedArray[i].trim();
    if (s === e) return true;
    // Scanned without check digit matches expected without check digit
    if (s.length > 6 && e.length > 6 && s.slice(0, -1) === e.slice(0, -1)) return true;
    // Scanned is one digit shorter (missing check digit)
    if (s.length === e.length - 1 && e.slice(0, -1) === s) return true;
    // Scanned is one digit longer (extra check digit)
    if (s.length === e.length + 1 && s.slice(0, -1) === e) return true;
    // Zero-padded: 12-digit UPC vs 13-digit EAN (leading zero)
    if (s.length === 12 && e.length === 13 && e.charAt(0) === '0' && e.slice(1) === s) return true;
    if (s.length === 13 && e.length === 12 && s.charAt(0) === '0' && s.slice(1) === e) return true;
  }
  return false;
}

function identifyItem(barcode) {
  if (barcode.trim().length < 6) {
    state.identifiedItem = null;
    state.hasInner = true;
    return;
  }
  const clean = barcode.trim();
  for (var i = 0; i < state.lookupData.length; i++) {
    var entry = state.lookupData[i];
    if (fuzzyBarcodeMatch(clean, entry.masterUpc) || fuzzyBarcodeMatch(clean, entry.upc)) {
      state.identifiedItem = entry;
      state.hasInner = entry.hasInner;
      return;
    }
  }
  state.identifiedItem = null;
  state.hasInner = true;
}

function goNextStep() {
  var steps = getVisibleSteps();
  if (state.step < steps.length - 1) {
    state.step++;
    render();
  }
}

function goPrevStep() {
  if (state.step > 0) {
    state.step--;
    render();
  }
}
// ===== PHOTO COMPRESSION =====
function compressAndStore(file, idx) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var maxDim = 1200;
      var w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      var base64 = dataUrl.split(',')[1];
      state.photos[idx] = { preview: dataUrl, base64: base64 };
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===== SAVE ITEM TO BACKEND =====
function saveCurrentItem() {
  showLoading('Saving item and uploading photos...');
  
  var photoData = {};
  for (var key in state.photos) {
    if (state.photos.hasOwnProperty(key)) {
      photoData[key] = state.photos[key].base64;
    }
  }
  
  var payload = {
    inspector: state.inspector,
    container: state.container,
    poNumber: state.selectedPO,
    masterBarcode: state.masterBarcode.trim(),
    innerBarcode: state.innerBarcode.trim(),
    itemBarcode: state.itemBarcode.trim(),
    photos: photoData
  };
  
  fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.text(); })
    .then(function(response) {
      hideLoading();
      try {
        var result = JSON.parse(response);
        if (result.success) {
          state.lastResult = result;
          state.results.push(result);
          state.currentItem++;
          state.screen = 'result';
          render();
        } else {
          showToast('Error: ' + (result.error || 'Unknown error'));
        }
      } catch(e) {
        showToast('Error parsing response');
      }
    })
    .catch(function(err) {
      hideLoading();
      showToast('Save failed: ' + err.message);
    });
}

// ===== INIT =====
function init() {
  // Request camera permission upfront so it's ready for scanning
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(function(stream) {
        // Permission granted — stop the stream immediately, we just needed the permission
        stream.getTracks().forEach(function(t) { t.stop(); });
        console.log('Camera permission granted');
      })
      .catch(function(err) {
        console.log('Camera permission not yet granted:', err.message);
      });
  }
  render();
  loadLookupData();
}

function loadLookupData() {
  fetch(API_URL + '?action=getLookup')
    .then(function(r) { return r.text(); })
    .then(function(response) {
      try {
        state.lookupData = JSON.parse(response);
        state.lookupLoaded = true;
        render();
      } catch(e) {
        showToast('Failed to load product data');
      }
    })
    .catch(function(err) {
      showToast('Failed to load products: ' + err.message);
    });
}

// ===== CAMERA BARCODE SCANNER =====
var activeCameraScanner = null;
var activeCameraScanTarget = null;

function startCameraScan(target) {
  // Make sure any previous scanner is fully stopped first
  if (activeCameraScanner) {
    activeCameraScanner.stop().then(function() {
      activeCameraScanner.clear();
      activeCameraScanner = null;
      setTimeout(function() { doStartCamera(target); }, 300);
    }).catch(function() {
      activeCameraScanner = null;
      setTimeout(function() { doStartCamera(target); }, 300);
    });
  } else {
    doStartCamera(target);
  }
}

function doStartCamera(target) {
  activeCameraScanTarget = target;
  var readerId = 'camera-reader-' + target;
  var readerEl = document.getElementById(readerId);
  if (!readerEl) return;

  readerEl.classList.remove('hidden');
  readerEl.innerHTML = '<div class="camera-viewfinder" id="camera-vf-' + target + '"></div>' +
    '<button class="btn-cancel-scan" id="cancel-scan-' + target + '">✕ Cancel Scan</button>';

  var cancelBtn = document.getElementById('cancel-scan-' + target);
  if (cancelBtn) cancelBtn.addEventListener('click', function() { stopCameraScan(true); });

  var wrapEl = readerEl.previousElementSibling;
  if (wrapEl && wrapEl.classList.contains('camera-scanner-wrap')) wrapEl.classList.add('hidden');

  var viewfinderId = 'camera-vf-' + target;

  // Try live camera first, fall back to file-based scanning
  Html5Qrcode.getCameras().then(function(cameras) {
    if (!cameras || cameras.length === 0) {
      showToast('No camera found — use photo mode');
      switchToPhotoMode(target);
      return;
    }
    activeCameraScanner = new Html5Qrcode(viewfinderId);
    var config = {
      fps: 10,
      qrbox: function(vw, vh) {
        return { width: Math.floor(vw * 0.8), height: Math.floor(vh * 0.5) };
      },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.CODE_128
      ]
    };
    activeCameraScanner.start(
      { facingMode: 'environment' },
      config,
      function onScanSuccess(decodedText) {
        applyCameraScan(target, decodedText.trim());
      },
      function onScanFailure() { /* keep trying */ }
    ).catch(function(err) {
      console.error('Live camera failed, switching to photo mode:', err);
      activeCameraScanner = null;
      switchToPhotoMode(target);
    });
  }).catch(function(err) {
    console.error('getCameras failed, switching to photo mode:', err);
    switchToPhotoMode(target);
  });
}

function switchToPhotoMode(target) {
  var readerId = 'camera-reader-' + target;
  var readerEl = document.getElementById(readerId);
  if (!readerEl) return;
  readerEl.classList.remove('hidden');
  readerEl.innerHTML = '<div style="text-align:center;padding:20px;background:#f8f9fa;border-radius:8px;margin-bottom:10px">' +
    '<p style="margin-bottom:12px;font-size:14px;color:#555">Take a photo of the barcode:</p>' +
    '<label class="btn btn-primary" style="display:inline-block;width:auto;padding:14px 30px;cursor:pointer">' +
    '📷 Open Camera' +
    '<input type="file" accept="image/*" capture="environment" id="barcode-photo-' + target + '" style="display:none">' +
    '</label></div>' +
    '<button class="btn-cancel-scan" id="cancel-scan-' + target + '">✕ Cancel</button>';
  
  var cancelBtn = document.getElementById('cancel-scan-' + target);
  if (cancelBtn) cancelBtn.addEventListener('click', function() { stopCameraScan(true); });
  
  var photoInput = document.getElementById('barcode-photo-' + target);
  if (photoInput) {
    photoInput.addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      showLoading('Reading barcode from photo...');
      var html5Qr = new Html5Qrcode('camera-vf-temp-' + target);
      // Create a temp div for scanning
      var tempDiv = document.createElement('div');
      tempDiv.id = 'camera-vf-temp-' + target;
      tempDiv.style.display = 'none';
      document.body.appendChild(tempDiv);
      html5Qr.scanFile(file, true).then(function(decodedText) {
        hideLoading();
        document.body.removeChild(tempDiv);
        applyCameraScan(target, decodedText.trim());
      }).catch(function(err) {
        hideLoading();
        document.body.removeChild(tempDiv);
        showToast('Could not read barcode from photo — try again');
      });
    });
  }
}

function applyCameraScan(target, barcode) {
  if (!barcode) return;
  if (target === 'master') {
    state.masterBarcode = barcode;
    identifyItem(barcode);
  } else if (target === 'inner') {
    state.innerBarcode = barcode;
  } else if (target === 'item') {
    state.itemBarcode = barcode;
  }
  stopCameraScan(false);
  showToast('Scanned: ' + barcode);
  render();
}

function stopCameraScan(reshow) {
  if (activeCameraScanner) {
    activeCameraScanner.stop().then(function() {
      activeCameraScanner.clear();
      activeCameraScanner = null;
      cleanupCameraUI(reshow);
    }).catch(function() {
      activeCameraScanner = null;
      cleanupCameraUI(reshow);
    });
  } else {
    cleanupCameraUI(reshow);
  }
}

function cleanupCameraUI(reshow) {
  ['master', 'inner', 'item'].forEach(function(t) {
    var el = document.getElementById('camera-reader-' + t);
    if (el) {
      el.innerHTML = '';
      el.classList.add('hidden');
      // Re-show the scan button
      if (reshow) {
        var wrapEl = el.previousElementSibling;
        if (wrapEl && wrapEl.classList.contains('camera-scanner-wrap')) wrapEl.classList.remove('hidden');
      }
    }
  });
  activeCameraScanTarget = null;
}

// ===== BARCODE SCANNER BUFFER =====
// Captures rapid keyboard input (from scanner) even if input field loses focus
var scanBuffer = '';
var scanTimeout = null;
var SCAN_DELAY = 80; // ms between characters — scanners are fast, humans are slow

document.addEventListener('keydown', function(e) {
  // Only capture on barcode scan steps
  var steps = getVisibleSteps();
  var stepName = steps[state.step];
  if (state.screen !== 'inspect') return;
  if (stepName !== 'scan-master' && stepName !== 'scan-inner' && stepName !== 'scan-item') return;
  
  // Check if an input field already has focus
  var active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) {
    // Input has focus — let normal input handling work
    // But listen for Enter to auto-advance
    if (e.key === 'Enter') {
      e.preventDefault();
      var nextBtn = document.getElementById('next-step');
      if (nextBtn && !nextBtn.disabled) nextBtn.click();
    }
    return;
  }
  
  // No input focused — buffer the scanner input
  if (e.key === 'Enter') {
    e.preventDefault();
    if (scanBuffer.length > 3) {
      // Apply buffered barcode to the right field
      if (stepName === 'scan-master') {
        state.masterBarcode = scanBuffer;
        identifyItem(scanBuffer);
      } else if (stepName === 'scan-inner') {
        state.innerBarcode = scanBuffer;
      } else if (stepName === 'scan-item') {
        state.itemBarcode = scanBuffer;
      }
      scanBuffer = '';
      render();
      // Auto-focus the field after render
      setTimeout(function() {
        var fieldId = stepName === 'scan-master' ? 'master-bc' : (stepName === 'scan-inner' ? 'inner-bc' : 'item-bc');
        var el = document.getElementById(fieldId);
        if (el) el.focus();
      }, 50);
    }
    scanBuffer = '';
    return;
  }
  
  // Single printable character
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    scanBuffer += e.key;
    clearTimeout(scanTimeout);
    scanTimeout = setTimeout(function() {
      // If buffer has content after delay, it was probably typed slowly — try to apply
      if (scanBuffer.length > 3) {
        if (stepName === 'scan-master') {
          state.masterBarcode = scanBuffer;
          identifyItem(scanBuffer);
        } else if (stepName === 'scan-inner') {
          state.innerBarcode = scanBuffer;
        } else if (stepName === 'scan-item') {
          state.itemBarcode = scanBuffer;
        }
        render();
      }
      scanBuffer = '';
    }, 500);
  }
});

// Auto-focus barcode inputs after each render
var origRender = render;
render = function() {
  origRender();
  setTimeout(function() {
    var steps = getVisibleSteps();
    var stepName = steps[state.step];
    if (state.screen === 'inspect') {
      var fieldId = null;
      if (stepName === 'scan-master') fieldId = 'master-bc';
      else if (stepName === 'scan-inner') fieldId = 'inner-bc';
      else if (stepName === 'scan-item') fieldId = 'item-bc';
      if (fieldId) {
        var el = document.getElementById(fieldId);
        if (el) el.focus();
      }
    }
  }, 50);
};

// Start the app
init();

})();
</script>
